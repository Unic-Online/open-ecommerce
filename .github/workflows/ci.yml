name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.template }} · lint, typecheck, unit, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        template: [storefront-i18n, storefront-single]
    defaults:
      run:
        working-directory: ${{ matrix.template }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.template }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: ${{ matrix.template }} · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        template: [storefront-i18n, storefront-single]
    defaults:
      run:
        working-directory: ${{ matrix.template }}
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      # 127.0.0.1, not localhost: on GitHub runners `localhost` can resolve to
      # ::1 first, where the Mongo service container is not listening — the
      # driver then hangs for its 30s server-selection timeout and every
      # DB-touching spec times out.
      MONGODB_URI: mongodb://127.0.0.1:27017
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.template }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.template }}
          path: ${{ matrix.template }}/playwright-report
          retention-days: 7
